name: Client Support Ticket
description: Track client requests and support work
labels: ["ticket", "needs-triage"]
body:
  - type: input
    attributes:
      label: Client Name
      placeholder: "Acme Corp"
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Ticket Type
      options:
        - Account Access
        - New Setup
        - Network
        - Maintainance
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Priority
      options:
        - Critical (down/blocked)
        - High
        - Normal
        - Low (when time allows)

  - type: textarea
    attributes:
      label: Issue Description
      placeholder: "What does the client need?"
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps Taken (if applicable)
      placeholder: "What have you tried so far?"

  - type: textarea
    attributes:
      label: Internal Notes
      placeholder: "Troubleshooting notes, next steps, client communication, etc."

  - type: input
    attributes:
      label: Estimated Hours
      placeholder: "e.g., 1.5"
